<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSMA Frontend Simulator</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffdfa;
      --text: #161410;
      --muted: #6a6358;
      --accent: #0f6d52;
      --line: #d8d0c3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 15%, #fff6d6 0%, var(--bg) 45%);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1 { margin: 0 0 12px; }
    .controls, .grid { display: grid; gap: 12px; }
    .controls { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-bottom: 12px; }
    .grid { grid-template-columns: 1fr 1fr; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input, select, button, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      background: white;
    }
    button { cursor: pointer; background: var(--accent); color: white; border: none; }
    button.secondary { background: #5f5a50; }
    pre {
      margin: 0;
      padding: 10px;
      min-height: 340px;
      max-height: 420px;
      overflow: auto;
      background: #121212;
      color: #dffbe2;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.35;
    }
    .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    @media (max-width: 900px) { .actions { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SSMA Frontend Simulator</h1>
    <div class="controls card">
      <div>
        <label>Base URL</label>
        <input id="baseUrl" value="http://127.0.0.1:5050" />
      </div>
      <div>
        <label>Site</label>
        <input id="site" value="default" />
      </div>
      <div>
        <label>Subprotocol</label>
        <input id="subprotocol" value="1.0.0" />
      </div>
      <div>
        <label>Intent ID</label>
        <input id="intentId" value="i-1" />
      </div>
      <div>
        <label>Intent Type</label>
        <select id="intentType">
          <option>TODO_CREATE</option>
          <option>TODO_UPDATE</option>
          <option>TODO_TOGGLE</option>
          <option>TODO_DELETE</option>
        </select>
      </div>
      <div>
        <label>Payload JSON</label>
        <textarea id="payload" rows="2">{"id":"todo-1","title":"First todo"}</textarea>
      </div>
    </div>

    <div class="actions">
      <button id="connectWs">Connect WS Leader</button>
      <button id="connectSse">Connect SSE Follower</button>
      <button id="sendIntent">Send Intent Batch</button>
      <button id="subscribeGlobal" class="secondary">Subscribe Global</button>
    </div>

    <div class="grid" style="margin-top: 12px;">
      <div class="card">
        <h3>WS Log</h3>
        <pre id="wsLog"></pre>
      </div>
      <div class="card">
        <h3>SSE Log</h3>
        <pre id="sseLog"></pre>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let sse = null;

    const wsLog = document.getElementById('wsLog');
    const sseLog = document.getElementById('sseLog');
    const baseUrlInput = document.getElementById('baseUrl');

    function log(el, label, payload) {
      const line = `[${new Date().toISOString()}] ${label} ${typeof payload === 'string' ? payload : JSON.stringify(payload)}`;
      el.textContent += line + "\n";
      el.scrollTop = el.scrollHeight;
    }

    function wsUrl(role) {
      const raw = baseUrlInput.value.replace(/\/$/, '');
      const url = raw.replace('http://', 'ws://').replace('https://', 'wss://');
      const site = encodeURIComponent(document.getElementById('site').value);
      const subprotocol = encodeURIComponent(document.getElementById('subprotocol').value);
      return `${url}/optimistic/ws?role=${role}&site=${site}&subprotocol=${subprotocol}`;
    }

    function connectWs() {
      if (ws) ws.close();
      ws = new WebSocket(wsUrl('leader'));
      ws.onopen = () => log(wsLog, 'ws.open', 'connected');
      ws.onclose = (event) => log(wsLog, 'ws.close', { code: event.code, reason: event.reason });
      ws.onerror = () => log(wsLog, 'ws.error', 'socket error');
      ws.onmessage = (msg) => {
        try {
          log(wsLog, 'ws.recv', JSON.parse(msg.data));
        } catch {
          log(wsLog, 'ws.recv', msg.data);
        }
      };
    }

    function connectSse() {
      if (sse) sse.close();
      const base = baseUrlInput.value.replace(/\/$/, '');
      sse = new EventSource(`${base}/optimistic/events`);
      sse.onopen = () => log(sseLog, 'sse.open', 'connected');
      sse.onerror = () => log(sseLog, 'sse.error', 'stream error');
      ['ready', 'replay', 'invalidate', 'island.invalidate', 'undo', 'rework'].forEach((type) => {
        sse.addEventListener(type, (evt) => {
          try {
            log(sseLog, `sse.${type}`, JSON.parse(evt.data));
          } catch {
            log(sseLog, `sse.${type}`, evt.data || '');
          }
        });
      });
    }

    function sendIntent() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log(wsLog, 'ws.send', 'connect websocket first');
        return;
      }
      let payload;
      try {
        payload = JSON.parse(document.getElementById('payload').value || '{}');
      } catch {
        log(wsLog, 'ws.send', 'invalid payload json');
        return;
      }
      const msg = {
        type: 'intent.batch',
        intents: [{
          id: document.getElementById('intentId').value,
          intent: document.getElementById('intentType').value,
          payload,
          meta: { clock: Date.now(), channels: ['global'] }
        }]
      };
      ws.send(JSON.stringify(msg));
      log(wsLog, 'ws.send', msg);
    }

    function subscribeGlobal() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log(wsLog, 'ws.send', 'connect websocket first');
        return;
      }
      const msg = { type: 'channel.subscribe', channel: 'global', params: {} };
      ws.send(JSON.stringify(msg));
      log(wsLog, 'ws.send', msg);
    }

    document.getElementById('connectWs').addEventListener('click', connectWs);
    document.getElementById('connectSse').addEventListener('click', connectSse);
    document.getElementById('sendIntent').addEventListener('click', sendIntent);
    document.getElementById('subscribeGlobal').addEventListener('click', subscribeGlobal);
  </script>
</body>
</html>
