name: CI

on:
  push:
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/ssma-js/package-lock.json
      - run: npm --prefix apps/ssma-js ci
      - run: npm run check:docs
      - run: npm run test:conformance
      - run: npm --prefix apps/ssma-js run test -- tests/backend-http-client.test.js tests/config-subprotocol.test.js tests/conformance-vectors.test.js tests/contract-sync.test.js

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        working-directory: apps/ssma-rust
        run: cargo test -- --nocapture
